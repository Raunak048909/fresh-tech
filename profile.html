<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PI·HIRE — Investigator Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-logo" onclick="window.location='index.html'">
      <div class="navbar-logo-icon">PI</div>
      <div>
        <div class="navbar-logo-text">PI<span>·</span>HIRE</div>
        <div class="navbar-tagline">Verified Investigators Network</div>
      </div>
    </div>
    <div class="navbar-actions">
      <button class="btn-ghost">Post a Case</button>
      <button class="btn-primary">Sign In</button>
    </div>
  </nav>

  <!-- Profile Content -->
  <main class="profile-page" id="profileContent"></main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div id="modalInner"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">© 2024 <span>PI·HIRE</span> — All rights reserved · Confidentiality Guaranteed · Licensed Investigators Only</footer>

  <script src="data.js"></script>
  <script>
    // ── Helpers ──────────────────────────────────────────
    function starsHTML(rating) {
      let html = '<div class="stars">';
      for (let i = 1; i <= 5; i++) {
        html += `<span class="star ${i <= Math.round(rating) ? 'filled' : 'empty'}">★</span>`;
      }
      return html + '</div>';
    }

    function getParam(key) {
      return new URLSearchParams(window.location.search).get(key);
    }

    // ── Load Profile ─────────────────────────────────────
    const id  = parseInt(getParam('id'));
    const inv = investigators.find(i => i.id === id);

    if (!inv) {
      document.getElementById('profileContent').innerHTML = `
        <div class="not-found">
          <h2>Investigator Not Found</h2>
          <p>This profile does not exist or may have been removed.</p>
          <button class="btn-primary" onclick="window.location='index.html'" style="padding:0.6rem 1.4rem;border-radius:6px;font-weight:600;font-size:0.875rem;margin-top:1rem;">← Back to Listings</button>
        </div>`;
    } else {
      document.title = `PI·HIRE — ${inv.name}`;
      renderProfile(inv);
    }

    function renderProfile(inv) {
      document.getElementById('profileContent').innerHTML = `
        <button class="btn-back" onclick="window.history.back()">← Back to listings</button>

        <!-- Hero -->
        <div class="profile-hero">
          <div class="profile-photo-wrap">
            <img src="${inv.image}" alt="${inv.name}" class="profile-photo"
              onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(inv.name)}&background=1a1a20&color=c9a84c&size=256'" />
            ${inv.badge ? `<div class="profile-badge-img">${inv.badge}</div>` : ''}
          </div>
          <div class="profile-meta">
            <h1 class="profile-name">${inv.name}</h1>
            <div class="profile-spec">${inv.specialization}</div>
            <div class="profile-attrs">
              <div class="attr-pill">📍 ${inv.location}</div>
              <div class="attr-pill">💼 ${inv.experience} yrs experience</div>
              <div class="attr-pill">🗂️ ${inv.category}</div>
              <div class="attr-pill">✓ Licensed & Verified</div>
            </div>
            <div class="profile-rating-row">
              <div class="rating-big">${inv.rating}</div>
              <div class="rating-info">
                ${starsHTML(inv.rating)}
                <small>${inv.reviews.length} verified reviews</small>
              </div>
            </div>
            <div class="profile-cta-row">
              <button class="btn-contact" onclick="openModal()">📋 Submit Case Request</button>
              <button class="btn-save">♡ Save Profile</button>
            </div>
          </div>
        </div>

        <!-- Detail Grid -->
        <div class="profile-grid">

          <div class="profile-card">
            <div class="section-label">About</div>
            <p class="profile-desc">${inv.description}</p>
          </div>

          <div class="profile-card">
            <div class="section-label">Languages</div>
            <div class="lang-list">${inv.languages.map(l => `<span class="lang-tag">${l}</span>`).join('')}</div>
            <div class="section-label" style="margin-top:1.25rem">Experience</div>
            <div><span class="exp-big">${inv.experience}</span><span class="exp-label">years</span></div>
          </div>

          <div class="profile-card">
            <div class="section-label">Skills & Specializations</div>
            <div class="skills-list">${inv.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
          </div>

          <div class="profile-card">
            <div class="section-label">Case History</div>
            <div class="case-list">
              ${inv.cases.map(c => `
                <div class="case-item">
                  <div>
                    <div class="case-title">${c.title}</div>
                    <div class="case-outcome">✓ ${c.outcome}</div>
                  </div>
                  <div class="case-year">${c.year}</div>
                </div>`).join('')}
            </div>
          </div>

          <div class="profile-card full-width">
            <div class="section-label">Client Reviews (${inv.reviews.length})</div>
            <div class="reviews-list">
              ${inv.reviews.map(r => `
                <div class="review-item">
                  <div class="review-header">
                    <span class="review-name">${r.name}</span>
                    ${starsHTML(r.rating)}
                  </div>
                  <p class="review-text">"${r.text}"</p>
                </div>`).join('')}
            </div>
          </div>

        </div>
      `;
    }

    // ── Modal ─────────────────────────────────────────────
    let selectedFile = null;

    function openModal() {
      selectedFile = null;
      document.getElementById('modalInner').innerHTML = buildModalForm();
      document.getElementById('modalOverlay').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      setupDropZone();
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modalOverlay')) return;
      forceCloseModal();
    }

    function forceCloseModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      document.body.style.overflow = '';
      selectedFile = null;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') forceCloseModal();
    });

    function buildModalForm() {
      return `
        <div class="modal-header">
          <div>
            <div class="modal-eyebrow">Submit Case Request</div>
            <h2 class="modal-title">Hire ${inv.name}</h2>
          </div>
          <button class="modal-close" onclick="forceCloseModal()">✕</button>
        </div>
        <div class="modal-body">

          <div class="form-section-label">Your Details</div>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="f-name" placeholder="e.g. Ramesh Kumar" />
              <span class="field-err" id="e-name"></span>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="f-phone" placeholder="10-digit mobile number" />
              <span class="field-err" id="e-phone"></span>
            </div>
          </div>
          <div class="form-group">
            <label>Email <span class="optional">(optional)</span></label>
            <input type="email" id="f-email" placeholder="you@example.com" />
          </div>

          <div class="form-section-label" style="margin-top:1.25rem">Case Details</div>
          <div class="form-group">
            <label>Case Type *</label>
            <select id="f-casetype">
              <option value="">— Select case type —</option>
              <option>Missing Person</option>
              <option>Surveillance</option>
              <option>Fraud Investigation</option>
              <option>Background Check</option>
              <option>Matrimonial Investigation</option>
              <option>Corporate Espionage</option>
              <option>Other</option>
            </select>
            <span class="field-err" id="e-casetype"></span>
          </div>
          <div class="form-group">
            <label>Case Description *</label>
            <textarea id="f-desc" rows="3" placeholder="Briefly describe your situation and what you need investigated..." oninput="document.getElementById('charCount').textContent=this.value.length+' chars'"></textarea>
            <span id="charCount" class="char-count">0 chars</span>
            <span class="field-err" id="e-desc"></span>
          </div>

          <!-- FIR Section -->
          <div class="fir-section">
            <div class="fir-header">
              <div class="fir-badge">⚖️</div>
              <div>
                <div class="fir-title">FIR Document Upload</div>
                <div class="fir-sub">Attach your registered FIR to make this case legally binding. <em>Optional but recommended.</em></div>
              </div>
            </div>

            <div class="drop-zone" id="dropZone" onclick="document.getElementById('firFileInput').click()" tabindex="0">
              <input type="file" id="firFileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFileSelect(this.files[0])" />
              <div id="dropZoneContent">
                <div class="drop-icon">📁</div>
                <div class="drop-text">Drag & drop your FIR here</div>
                <div class="drop-sub">or click to browse · PDF, JPG, PNG · Max 10MB</div>
              </div>
            </div>
            <span class="field-err" id="e-file"></span>

            <div class="form-row" style="margin-top:0.85rem">
              <div class="form-group">
                <label>FIR Number <span class="optional">(if available)</span></label>
                <input type="text" id="f-firno" placeholder="e.g. FIR/2024/001234" />
                <span class="field-err" id="e-firno"></span>
              </div>
              <div class="form-group">
                <label>Police Station <span class="optional">(if available)</span></label>
                <input type="text" id="f-station" placeholder="e.g. Connaught Place PS, Delhi" />
                <span class="field-err" id="e-station"></span>
              </div>
            </div>
          </div>

          <div class="consent-note">
            🔒 By submitting, you confirm all information is truthful. Your data is kept confidential and shared only with the assigned investigator.
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-save" onclick="forceCloseModal()">Cancel</button>
          <button class="btn-contact" onclick="submitForm()">Submit Case Request →</button>
        </div>
      `;
    }

    function setupDropZone() {
      const zone = document.getElementById('dropZone');
      if (!zone) return;
      zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        handleFileSelect(e.dataTransfer.files[0]);
      });
    }

    function handleFileSelect(file) {
      if (!file) return;
      const allowed = ['application/pdf','image/jpeg','image/png','image/jpg'];
      if (!allowed.includes(file.type)) {
        document.getElementById('e-file').textContent = 'Only PDF, JPG or PNG files allowed.';
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        document.getElementById('e-file').textContent = 'File must be under 10MB.';
        return;
      }
      selectedFile = file;
      document.getElementById('e-file').textContent = '';
      const icon = file.type === 'application/pdf' ? '📄' : '🖼️';
      const kb   = (file.size / 1024).toFixed(1);
      document.getElementById('dropZone').classList.add('has-file');
      document.getElementById('dropZoneContent').innerHTML = `
        <div class="file-preview">
          <span class="file-icon-big">${icon}</span>
          <div>
            <div class="file-name">${file.name}</div>
            <div class="file-size">${kb} KB · Click to change</div>
          </div>
          <span class="file-ok">✓</span>
        </div>`;
    }

    function validate() {
      let ok = true;
      const set = (id, msg) => { document.getElementById(id).textContent = msg; if (msg) ok = false; };

      const name    = document.getElementById('f-name').value.trim();
      const phone   = document.getElementById('f-phone').value.trim().replace(/\s/g,'');
      const ctype   = document.getElementById('f-casetype').value;
      const desc    = document.getElementById('f-desc').value.trim();
      const firno   = document.getElementById('f-firno').value.trim();
      const station = document.getElementById('f-station').value.trim();

      set('e-name',    !name ? 'Full name is required.' : '');
      set('e-phone',   !phone ? 'Phone number is required.' : !/^\d{10}$/.test(phone) ? 'Enter a valid 10-digit number.' : '');
      set('e-casetype',!ctype ? 'Please select a case type.' : '');
      set('e-desc',    !desc ? 'Please describe your case.' : desc.length < 20 ? 'Please provide at least 20 characters.' : '');
      set('e-firno',   (station && !firno) ? 'Please enter the FIR number.' : '');
      set('e-station', (firno && !station) ? 'Please enter the police station.' : '');

      return ok ? { name, phone, ctype, desc, firno, station } : null;
    }

    function submitForm() {
      const data = validate();
      if (!data) return;

      const refId = Math.random().toString(36).substring(2, 10).toUpperCase();
      const fileIcon = selectedFile ? (selectedFile.type === 'application/pdf' ? '📄' : '🖼️') : null;

      document.getElementById('modalInner').innerHTML = `
        <div class="modal-header">
          <div>
            <div class="modal-eyebrow">Request Submitted</div>
            <h2 class="modal-title">Case Registered!</h2>
          </div>
          <button class="modal-close" onclick="forceCloseModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-success">
            <div class="success-icon">✓</div>
            <h2 class="success-title">Case Request Submitted!</h2>
            <p class="success-sub">
              Your request has been sent to <strong>${inv.name}</strong>.<br/>
              They will contact you within <strong>24 hours</strong> on your registered number.
            </p>

            <div class="success-summary">
              <div class="summary-row"><span>Client</span><strong>${data.name}</strong></div>
              <div class="summary-row"><span>Phone</span><strong>${data.phone}</strong></div>
              <div class="summary-row"><span>Case Type</span><strong>${data.ctype}</strong></div>
              ${selectedFile ? `
              <div class="summary-row">
                <span>FIR Document</span>
                <strong>${fileIcon} ${selectedFile.name} <span class="verified-tag">Uploaded</span></strong>
              </div>` : ''}
              ${data.firno ? `<div class="summary-row"><span>FIR No.</span><strong>${data.firno} — ${data.station}</strong></div>` : ''}
              <div class="summary-row"><span>Investigator</span><strong>${inv.name}</strong></div>
              <div class="summary-row"><span>Reference ID</span><strong class="ref-id">#${refId}</strong></div>
            </div>

            <div class="legal-note">
              🔒 Your documents are encrypted and shared only with the assigned investigator.
              ${selectedFile || data.firno ? 'Submission of FIR makes this case legally traceable.' : ''}
            </div>

            <button class="btn-contact" style="width:100%;margin-top:1.25rem" onclick="forceCloseModal()">Done</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
